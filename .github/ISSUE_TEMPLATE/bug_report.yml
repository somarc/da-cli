name: Bug report
description: Report a reproducible da-cli problem.
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Remove tokens, bearer headers, private URLs, and customer data before submitting.
  - type: input
    id: version
    attributes:
      label: da-cli version
      description: Run `da --version`.
      placeholder: 0.2.0
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Run `node --version`.
      placeholder: v22.14.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15.5
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the exact command that failed.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include sanitized output or logs.
      render: text
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: List the smallest steps that reproduce the issue.
    validations:
      required: true
